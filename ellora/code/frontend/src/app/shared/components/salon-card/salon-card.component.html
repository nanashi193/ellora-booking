<div class="group cursor-pointer flex flex-col gap-4 bg-white">
      <!-- Image Container -->
      <div class="relative w-full aspect-[4/3] bg-ivory-200 overflow-hidden rounded-t-xl">
        <img 
          [src]="salon().images[0]" 
          [alt]="salon().name"
          class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
        />
        <!-- Rating Badge -->
        <div class="absolute top-3 right-3 flex items-center gap-1 text-xs font-medium text-charcoal-900 bg-white/40 backdrop-blur-md px-2 py-1 rounded">
          <svg class="w-3.5 h-3.5 text-charcoal-900" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
          </svg>
          {{ salon().rating }}
        </div>
      </div>

      <!-- Content -->
      <div class="flex flex-col gap-2 px-1">
        <h3 class="font-serif text-xl font-medium text-charcoal-900 line-clamp-1 group-hover:text-dusty-pink-600 transition-colors">
          {{ salon().name }}
        </h3>
        
        <p class="text-charcoal-800/80 text-sm line-clamp-2 min-h-[40px]">
          {{ salon().description || 'Dịch vụ làm móng và chăm sóc cá nhân cao cấp.' }}
        </p>
        
        <div class="flex items-center justify-between mt-2 pt-2">
          <div class="flex items-center gap-1.5 text-xs font-medium text-charcoal-800/60">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            địa chỉ
          </div>
          
          <span class="text-xs font-medium text-[#915B63] hover:text-[#7A4C53] transition-colors">Đặt ngay</span>
        </div>
      </div>
    </div>
