<div class="group cursor-pointer flex flex-col gap-3">
      <!-- Image Container -->
      <div class="relative w-full aspect-[4/3] bg-ivory-200 overflow-hidden">
        <img 
          [src]="salon().images[0]" 
          [alt]="salon().name"
          class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
        />
        <!-- Heart Icon (Save) -->
        <button class="absolute top-3 right-3 p-2 bg-white/50 backdrop-blur-md rounded-full hover:bg-white transition-colors">
          <svg class="w-5 h-5 text-charcoal-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
        </button>
      </div>

      <!-- Content -->
      <div class="flex flex-col gap-1">
        <div class="flex items-start justify-between gap-2">
          <h3 class="font-serif text-xl font-medium text-charcoal-900 line-clamp-1 group-hover:text-dusty-pink-600 transition-colors">
            {{ salon().name }}
          </h3>
          <app-rating [value]="salon().rating" [reviewCount]="salon().reviewCount" class="shrink-0 pt-1" />
        </div>
        
        <p class="text-charcoal-800/80 text-sm line-clamp-1">{{ salon().city }}</p>
        
        <div class="flex items-center gap-2 mt-1">
          @if (salon().distance) {
            <span class="text-xs font-medium text-charcoal-800 bg-white border border-charcoal-800/10 px-2 py-0.5 rounded-full">
              {{ salon().distance }} mi
            </span>
          }
          @if (salon().nextAvailable) {
            <span class="text-xs text-dusty-pink-600">Next avl: Tomorrow</span>
          }
        </div>
      </div>
    </div>
