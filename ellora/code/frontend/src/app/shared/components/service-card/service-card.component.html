<div class="service-card">
  <div class="service-card__info">
    <h4 class="service-card__name">{{ service().name }}</h4>
    <p class="service-card__desc">{{ service().description }}</p>
    <span class="service-card__duration">
      <svg class="service-card__duration-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      {{ service().durationMinutes }} Phút
    </span>
  </div>
  <div class="service-card__action">
    <span class="service-card__price">${{ service().price }}</span>
    <button type="button" class="service-card__add-btn" (click)="onBook()">+ Thêm</button>
  </div>
</div>
