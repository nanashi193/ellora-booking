<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-5 bg-white border border-charcoal-800/10 hover:border-dusty-pink-500/30 transition-colors">
      <div class="flex flex-col gap-1.5 flex-1">
        <h4 class="font-serif text-lg font-medium text-charcoal-900">{{ service().name }}</h4>
        <p class="text-charcoal-800/80 text-sm leading-relaxed">{{ service().description }}</p>
        <div class="flex items-center gap-4 mt-1 text-sm font-medium text-charcoal-900">
          <span class="flex items-center gap-1.5">
            <svg class="w-4 h-4 text-charcoal-800/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            {{ service().durationMinutes }} min
          </span>
          <span class="text-dusty-pink-600">\${{ service().price }}</span>
        </div>
      </div>
      
      <div class="shrink-0 mt-2 sm:mt-0">
        <app-button variant="secondary" size="sm" (click)="onBook()">
          Book Now
        </app-button>
      </div>
    </div>
