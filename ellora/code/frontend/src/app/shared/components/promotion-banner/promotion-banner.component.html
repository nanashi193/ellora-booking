<div class="relative w-full bg-charcoal-900 overflow-hidden flex flex-col md:flex-row items-center justify-between p-8 md:p-12 gap-8">
      <!-- Background subtle glow -->
      <div class="absolute top-0 right-0 w-96 h-96 bg-dusty-pink-500/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
      
      <div class="relative z-10 flex flex-col gap-4 max-w-xl">
        <span class="text-dusty-pink-500 text-sm font-medium tracking-widest uppercase">Special Offer</span>
        <h3 class="font-serif text-3xl md:text-5xl text-white font-medium leading-tight">
          {{ promotion().title }}
        </h3>
        <p class="text-ivory-100/80 text-lg">
          {{ promotion().description }}
        </p>
      </div>

      <div class="relative z-10 shrink-0 w-full md:w-auto">
        <app-button variant="primary" size="lg" customClass="w-full md:w-auto px-10 bg-ivory-50 text-charcoal-900 hover:bg-white hover:text-charcoal-900 shadow-xl">
          Claim Offer
        </app-button>
      </div>
    </div>
