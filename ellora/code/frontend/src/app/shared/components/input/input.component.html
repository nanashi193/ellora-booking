<div class="flex flex-col gap-1.5 w-full">
      @if (label()) {
        <label [for]="id()" class="text-sm font-medium text-charcoal-900">{{ label() }}</label>
      }
      <div class="relative">
        <input
          [id]="id()"
          [type]="type()"
          [placeholder]="placeholder()"
          [disabled]="disabled()"
          [value]="value()"
          (input)="onInput($event)"
          class="w-full px-4 py-2.5 bg-white border border-charcoal-800/20 rounded-none text-charcoal-900 placeholder:text-charcoal-800/40 focus:outline-none focus:border-dusty-pink-500 focus:ring-1 focus:ring-dusty-pink-500 transition-shadow disabled:bg-ivory-100 disabled:cursor-not-allowed"
        />
        @if (icon()) {
          <div class="absolute right-3 top-1/2 -translate-y-1/2 text-charcoal-800/40">
            <!-- Icon slot or default icon logic could go here -->
            <ng-content select="[icon]"></ng-content>
          </div>
        }
      </div>
      @if (error()) {
        <span class="text-xs text-red-500">{{ error() }}</span>
      }
    </div>
