<header class="w-full px-4 sm:px-6 pt-6 pointer-events-none">
  <div class="max-w-[1000px] mx-auto h-16 bg-[#F5F5F5]/95 backdrop-blur-md rounded-[32px] flex items-center justify-between px-6 sm:px-8 pointer-events-auto border border-black/[0.04] shadow-sm">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center h-full">
      <img src="ellora-logoWeb.png" alt="Ellora Logo" class="h-16 w-auto scale-[1.6] origin-left object-contain">
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex items-center gap-8">
      <a routerLink="/search" class="text-[15px] font-semibold text-charcoal-900 hover:text-black transition-colors">Near you</a>
      <a routerLink="/owner/dashboard" class="text-[15px] font-semibold text-charcoal-900 hover:text-black transition-colors">For Salons</a>
      <a routerLink="/login" class="text-[15px] font-semibold text-charcoal-900 hover:text-black transition-colors">Log in</a>
    </nav>

    <!-- Mobile Menu Toggle -->
    <button class="md:hidden p-2 -mr-2 text-charcoal-900 hover:bg-black/5 rounded-full transition-colors">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>
</header>
