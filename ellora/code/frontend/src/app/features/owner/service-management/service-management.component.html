<div class="p-8">
    <div class="flex flex-col gap-6">
      <div class="flex items-center justify-between">
        <h2 class="font-serif text-2xl text-charcoal-900">Service Management</h2>
        <button class="px-5 py-2.5 bg-dusty-pink-500 text-white text-sm font-medium hover:bg-dusty-pink-600 transition-colors">Add New Service</button>
      </div>

      <div class="bg-white border border-charcoal-800/10 shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-ivory-50 border-b border-charcoal-800/10">
              <th class="py-4 px-6 font-medium text-sm text-charcoal-800">Service Name</th>
              <th class="py-4 px-6 font-medium text-sm text-charcoal-800">Category</th>
              <th class="py-4 px-6 font-medium text-sm text-charcoal-800">Duration</th>
              <th class="py-4 px-6 font-medium text-sm text-charcoal-800">Price</th>
              <th class="py-4 px-6 font-medium text-sm text-charcoal-800">Status</th>
              <th class="py-4 px-6 font-medium text-sm text-charcoal-800 text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            @for (service of services(); track service.id) {
              <tr class="border-b border-charcoal-800/5 hover:bg-charcoal-800/5 transition-colors">
                <td class="py-4 px-6 font-medium text-charcoal-900">{{ service.name }}</td>
                <td class="py-4 px-6 text-sm text-charcoal-800">{{ service.category }}</td>
                <td class="py-4 px-6 text-sm text-charcoal-800">{{ service.duration }}</td>
                <td class="py-4 px-6 text-sm font-medium text-charcoal-900">{{ service.price }}</td>
                <td class="py-4 px-6">
                  <span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium"
                        [class.bg-green-100]="service.status === 'Active'"
                        [class.text-green-800]="service.status === 'Active'"
                        [class.bg-charcoal-800]="service.status === 'Inactive'"
                        [class.bg-opacity-10]="service.status === 'Inactive'"
                        [class.text-charcoal-800]="service.status === 'Inactive'">
                    {{ service.status }}
                  </span>
                </td>
                <td class="py-4 px-6 text-right">
                  <button class="text-sm font-medium text-dusty-pink-500 hover:text-dusty-pink-600 transition-colors">Edit</button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
</div>
