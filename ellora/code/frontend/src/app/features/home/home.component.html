<div class="flex flex-col w-full pb-20">
      <!-- Hero Section -->
      <section class="relative w-full bg-ivory-100 py-24 md:py-32 px-6 overflow-hidden">
        <div class="absolute top-0 right-0 w-[800px] h-[800px] bg-dusty-pink-500/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
        <div class="max-w-7xl mx-auto relative z-10 flex flex-col items-center text-center gap-8">
          <h1 class="font-serif text-5xl md:text-7xl font-medium text-charcoal-900 leading-tight max-w-4xl">
            Your sanctuary for premium self-care.
          </h1>
          <p class="text-charcoal-800/80 text-lg md:text-xl max-w-2xl">
            Discover and book the finest nail studios, spas, and wellness practitioners in your city.
          </p>
          
          <!-- Search Bar Mock -->
          <div class="mt-4 w-full max-w-3xl bg-white p-2 rounded-none border border-charcoal-800/10 shadow-sm flex flex-col md:flex-row gap-2">
            <div class="flex-1 flex items-center gap-3 px-4 py-3 md:py-2 border-b md:border-b-0 md:border-r border-charcoal-800/10">
              <svg class="w-5 h-5 text-charcoal-800/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
              <input type="text" placeholder="Treatment or salon" class="w-full bg-transparent focus:outline-none text-charcoal-900 placeholder:text-charcoal-800/40" />
            </div>
            <div class="flex-1 flex items-center gap-3 px-4 py-3 md:py-2">
              <svg class="w-5 h-5 text-charcoal-800/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
              <input type="text" placeholder="Location" class="w-full bg-transparent focus:outline-none text-charcoal-900 placeholder:text-charcoal-800/40" />
            </div>
            <button class="bg-dusty-pink-500 hover:bg-dusty-pink-600 text-white font-medium px-8 py-3 md:py-2 transition-colors shrink-0">
              Search
            </button>
          </div>
        </div>
      </section>

      <!-- Categories -->
      <section class="max-w-7xl mx-auto w-full px-6 py-12 border-b border-charcoal-800/10">
        <div class="flex flex-wrap items-center justify-center gap-3">
          @for (category of categories(); track category.id) {
            <app-badge color="outline" size="md" class="cursor-pointer hover:bg-charcoal-900 hover:text-white hover:border-charcoal-900 transition-colors">
              {{ category.name }}
            </app-badge>
          }
        </div>
      </section>

      <!-- Featured Salons -->
      <section class="max-w-7xl mx-auto w-full px-6 py-20">
        <app-section-header 
          title="Curated Studios" 
          subtitle="Featured" 
          linkText="View all studios" 
          linkHref="/search">
        </app-section-header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-10">
          @for (salon of salons(); track salon.id) {
            <app-salon-card [salon]="salon"></app-salon-card>
          }
        </div>
      </section>

      <!-- Promo Banner -->
      <section class="max-w-7xl mx-auto w-full px-6 py-12">
        <app-promotion-banner [promotion]="promo()"></app-promotion-banner>
      </section>
    </div>
