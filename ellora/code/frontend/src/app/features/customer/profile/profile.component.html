<div>
  <div class="flex justify-between items-center mb-6">
    <h2 class="font-serif text-2xl text-charcoal-900">Hồ sơ cá nhân</h2>
    <button class="text-sm font-semibold text-dusty-pink-600 hover:text-dusty-pink-700 transition-colors">Chỉnh sửa</button>
  </div>
  
  <div class="bg-white rounded-2xl shadow-sm border border-charcoal-800/5 p-8 flex flex-col md:flex-row gap-10 items-start">
    <!-- Avatar Section -->
    <div class="relative shrink-0">
      <div class="w-28 h-28 rounded-full overflow-hidden border-4 border-dusty-pink-500/20 shadow-sm relative">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=256&h=256" alt="Profile avatar" class="w-full h-full object-cover">
      </div>
      <button class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-dusty-pink-600 text-white flex items-center justify-center shadow-md hover:bg-dusty-pink-700 transition-colors border-2 border-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
      </button>
    </div>

    <!-- Form Section -->
    <div class="flex-1 w-full flex flex-col gap-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-charcoal-900/70 uppercase tracking-wider">Họ và tên</label>
          <input type="text" class="border border-charcoal-800/10 rounded-lg px-4 py-3 focus:outline-none focus:border-dusty-pink-500 w-full bg-white shadow-sm transition-colors" [value]="user().firstName + ' ' + user().lastName" disabled>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-charcoal-900/70 uppercase tracking-wider">Số điện thoại</label>
          <input type="tel" class="border border-charcoal-800/10 rounded-lg px-4 py-3 focus:outline-none focus:border-dusty-pink-500 w-full bg-white shadow-sm transition-colors" [value]="user().phone" disabled>
        </div>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-charcoal-900/70 uppercase tracking-wider">Email</label>
        <input type="email" class="border border-charcoal-800/10 rounded-lg px-4 py-3 focus:outline-none focus:border-dusty-pink-500 w-full bg-white shadow-sm text-charcoal-800 transition-colors" [value]="user().email" disabled>
      </div>
    </div>
  </div>
</div>
