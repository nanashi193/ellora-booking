<div class="max-w-4xl mx-auto px-6 py-12 lg:py-20 min-h-[calc(100vh-80px)]">
  <div class="flex flex-col md:flex-row gap-12">
    <!-- Sidebar Menu (Mock) -->
    <div class="w-full md:w-64 shrink-0">
      <h1 class="font-serif text-3xl text-charcoal-900 font-medium mb-6">Account</h1>
      <nav class="flex flex-col gap-2 text-sm font-medium">
        <a routerLink="/profile" class="py-2.5 px-4 bg-dusty-pink-500/10 text-dusty-pink-600 rounded-sm">Personal Info</a>
        <a routerLink="/my-bookings" class="py-2.5 px-4 text-charcoal-800 hover:bg-charcoal-800/5 rounded-sm transition-colors">My Bookings</a>
        <a href="#" class="py-2.5 px-4 text-charcoal-800 hover:bg-charcoal-800/5 rounded-sm transition-colors">Payment Methods</a>
        <a href="#" class="py-2.5 px-4 text-charcoal-800 hover:bg-charcoal-800/5 rounded-sm transition-colors">Settings</a>
        <div class="h-px bg-charcoal-800/10 my-2"></div>
        <a href="#" class="py-2.5 px-4 text-red-600 hover:bg-red-50 rounded-sm transition-colors">Log out</a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1">
      <h2 class="font-serif text-2xl text-charcoal-900 mb-6">Personal Information</h2>
      
      <div class="p-6 md:p-8 bg-white border border-charcoal-800/10 shadow-sm flex flex-col gap-6">
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-charcoal-900">First Name</label>
          <input type="text" class="border border-charcoal-800/20 px-4 py-2.5 focus:outline-none focus:border-dusty-pink-500 w-full md:w-2/3 bg-transparent" [value]="user().firstName">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-charcoal-900">Last Name</label>
          <input type="text" class="border border-charcoal-800/20 px-4 py-2.5 focus:outline-none focus:border-dusty-pink-500 w-full md:w-2/3 bg-transparent" [value]="user().lastName">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-charcoal-900">Email Address</label>
          <input type="email" class="border border-charcoal-800/20 px-4 py-2.5 focus:outline-none focus:border-dusty-pink-500 w-full md:w-2/3 bg-transparent text-charcoal-800" [value]="user().email" disabled>
          <span class="text-xs text-charcoal-800/60 mt-1">To change your email address, please contact support.</span>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-medium text-charcoal-900">Phone Number</label>
          <input type="tel" class="border border-charcoal-800/20 px-4 py-2.5 focus:outline-none focus:border-dusty-pink-500 w-full md:w-2/3 bg-transparent" [value]="user().phone">
        </div>

        <div class="pt-6 mt-2 border-t border-charcoal-800/10">
          <button class="px-6 py-2.5 bg-charcoal-900 text-white text-sm font-medium hover:bg-charcoal-800 transition-colors">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
</div>
