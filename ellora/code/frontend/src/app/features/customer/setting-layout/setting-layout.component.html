<div class="max-w-6xl mx-auto px-6 py-12 lg:py-16 min-h-[calc(100vh-80px)]">
  <div class="flex flex-col md:flex-row gap-8 lg:gap-16">
    <!-- Sidebar -->
    <div class="w-full md:w-64 shrink-0 flex flex-col gap-8">
      <div>
        <h1 class="font-serif text-3xl text-charcoal-900 font-medium mb-6">Cài đặt</h1>
        <nav class="flex flex-col gap-2 text-sm font-medium text-charcoal-800">
          <a routerLink="/setting/profile" 
             class="flex items-center gap-3 py-3 px-4 rounded-lg transition-colors"
             [ngClass]="{'bg-dusty-pink-500/10 text-dusty-pink-600 font-semibold': router.url.includes('/setting/profile'), 'hover:bg-charcoal-800/5': !router.url.includes('/setting/profile')}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Hồ sơ cá nhân
          </a>
          
          <a routerLink="/setting/security" 
             class="flex items-center gap-3 py-3 px-4 rounded-lg transition-colors"
             [ngClass]="{'bg-dusty-pink-500/10 text-dusty-pink-600 font-semibold': router.url.includes('/setting/security'), 'hover:bg-charcoal-800/5': !router.url.includes('/setting/security')}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Bảo mật
          </a>

          <a routerLink="/setting/my-bookings" 
             class="flex items-center gap-3 py-3 px-4 rounded-lg transition-colors"
             [ngClass]="{'bg-dusty-pink-500/10 text-dusty-pink-600 font-semibold': router.url.includes('/setting/my-bookings'), 'hover:bg-charcoal-800/5': !router.url.includes('/setting/my-bookings')}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Lịch sử đặt chỗ
          </a>

          <a routerLink="/setting/rewards" 
             class="flex items-center gap-3 py-3 px-4 rounded-lg transition-colors"
             [ngClass]="{'bg-dusty-pink-500/10 text-dusty-pink-600 font-semibold': router.url.includes('/setting/rewards'), 'hover:bg-charcoal-800/5': !router.url.includes('/setting/rewards')}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 12 17 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
            Điểm thưởng
          </a>
        </nav>
      </div>

      <!-- Membership Card -->
      <div class="bg-gradient-to-br from-pink-200 to-pink-300 rounded-2xl p-6 text-charcoal-900 shadow-sm relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -right-6 -top-6 w-24 h-24 rounded-full bg-white/20 blur-xl"></div>
        <div class="absolute -left-4 -bottom-4 w-16 h-16 rounded-full bg-white/10 blur-lg"></div>
        
        <div class="relative z-10">
          <p class="text-xs font-medium uppercase tracking-wider text-charcoal-900/70 mb-1">Thành viên Bạc</p>
          <div class="flex items-baseline gap-1 mb-4">
            <span class="text-3xl font-serif font-semibold">2,450</span>
            <span class="text-sm font-medium">điểm</span>
          </div>
          
          <div class="w-full bg-white/30 h-1.5 rounded-full overflow-hidden mb-2">
            <div class="bg-charcoal-900 h-full rounded-full" style="width: 75%"></div>
          </div>
          <p class="text-xs font-medium text-charcoal-900/70">Còn 550 điểm nữa để lên hạng Vàng</p>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 min-w-0">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
