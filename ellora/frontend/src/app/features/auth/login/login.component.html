<div class="login-page">
  <div class="panel-left">
    <img class="login-visual" src="/nail-login.gif" alt="Nhân vật nail salon" />
  </div>

  <div class="panel-right">
    <div class="corner-deco"></div>

    <div class="form-header">
      <div class="login-logo-wrap">
        <img class="login-logo" src="/ellora-logo.png?v=1" alt="Ellora" />
      </div>
      <div class="divider-line"></div>
      <h2>Đăng nhập</h2>
      <p>Vui lòng nhập thông tin tài khoản của bạn để tiếp tục.</p>
    </div>

    <div class="alert-box" [class.show]="showAlert">
      Thông tin đăng nhập không hợp lệ. Vui lòng kiểm tra lại.
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>
      <button type="button" class="btn-sso">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Tiếp tục với Google Workspace
      </button>

      <div class="sso-divider"><span>Hoặc đăng nhập bằng</span></div>

      <div class="form-group" [class.has-error]="emailInvalid">
        <div class="input-wrap">
          <label for="email" class="input-label">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            autocomplete="email"
          />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
        </div>
        <span class="field-error">Vui lòng nhập email hợp lệ.</span>
      </div>

      <div class="form-group" [class.has-error]="passwordInvalid">
        <div class="input-wrap">
          <label for="password" class="input-label">Mật khẩu</label>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            autocomplete="current-password"
          />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <button type="button" class="toggle-pw" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
        <span class="field-error">Mật khẩu không được để trống.</span>
      </div>

      <div class="form-meta">
        <label class="checkbox-wrap">
          <input type="checkbox" formControlName="remember" />
          <span class="custom-check"></span>
          Ghi nhớ đăng nhập
        </label>
        <a href="#" class="forgot-link">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn-login" [class.loading]="isLoading" [class.success]="isSuccess" [disabled]="isLoading">
        <div class="btn-inner">
          <div class="spinner"></div>
          <span class="btn-text">{{ isSuccess ? '✓ Thành công!' : 'Đăng nhập' }}</span>
        </div>
      </button>
    </form>

    <div class="form-footer">
      Chưa có tài khoản? Đăng ký tại <a href="#">đây</a>.
    </div>
  </div>
</div>
