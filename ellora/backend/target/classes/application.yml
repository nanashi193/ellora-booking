server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: booking-nail-ms

  datasource:
    url: postgresql://postgres.fzaebluklnysyqeewmkd:[YOUR-PASSWORD]@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres
    username: postgres.fzaebluklnysyqeewmkd
    password: Exe123@proj
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  cache:
    type: simple

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Ho_Chi_Minh

logging:
  level:
    com.bookingnailms: DEBUG
    org.springframework.security: INFO

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:BookingNailMSSecretKeyForJWTTokenGeneration2024VeryLongSecretKey}
    expiration-ms: 86400000        # 1 day
    refresh-expiration-ms: 604800000  # 7 days

  cors:
    allowed-origins: http://localhost:4200

# Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
